<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Dynamic Gradient with light theme presentation fallbacks for sandbox compatibility -->
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop class="stop-start" offset="0%" stop-color="#6366f1" />
      <stop class="stop-end" offset="100%" stop-color="#0ea5e9" />
    </linearGradient>
    
    <style>
      .brand-text {
        fill: #0f172a; /* Light theme: Dark Slate */
        transition: fill 0.3s ease;
      }
      .brand-underline {
        animation: blink 1.4s infinite ease-in-out;
      }
      .stop-start {
        stop-color: #6366f1; /* Light: Indigo */
      }
      .stop-end {
        stop-color: #0ea5e9; /* Light: Sky Blue */
      }
      @keyframes blink {
        0%, 100% { opacity: 0.15; }
        50% { opacity: 1; }
      }
      @media (prefers-color-scheme: dark) {
        .brand-text {
          fill: #f4f4f5 !important; /* Dark: Zinc 100 (White) */
        }
        .stop-start {
          stop-color: #a855f7 !important; /* Dark: Neon Purple */
        }
        .stop-end {
          stop-color: #06b6d4 !important; /* Dark: Neon Cyan */
        }
      }
    </style>
  </defs>
  
  <!-- Lowercase Monospace Developer Monogram (Normal weight console styling) -->
  <text class="brand-text" fill="#0f172a" x="256" y="380" 
        font-family="'JetBrains Mono', 'Fira Code', 'Segoe UI Mono', Consolas, Menlo, Monaco, monospace" 
        font-size="410" 
        font-weight="normal" 
        letter-spacing="-10"
        text-anchor="middle">ns</text>
        
  <!-- Balanced Accent Underline Capsule (Blinking caret animation) -->
  <rect class="brand-underline" fill="url(#brand-grad)" x="48" y="430" width="416" height="28" rx="14" />
</svg>
